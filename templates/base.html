<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .sidebar a {
            color: rgba(255,255,255,0.8);
            transition: all 0.3s;
        }
        .sidebar a:hover {
            color: white;
            background: rgba(255,255,255,0.1);
        }
        .card {
            border: none;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            transition: box-shadow 0.15s ease-in-out;
        }
        .card:hover {
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }
        .loading {
            display: none;
        }
        .alert {
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <div class="position-sticky pt-3">
                    <h5 class="text-white mb-4">
                        <i class="fas fa-project-diagram me-2"></i>
                        Knowledge Graph
                    </h5>
                    <ul class="nav nav-pills flex-column mb-auto">
                        <li class="nav-item">
                            <a href="{{ url_for('index') }}" class="nav-link rounded">
                                <i class="fas fa-home me-2"></i>
                                Home
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="{{ url_for('upload_page') }}" class="nav-link rounded">
                                <i class="fas fa-upload me-2"></i>
                                Upload Documents
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="{{ url_for('query_page') }}" class="nav-link rounded">
                                <i class="fas fa-search me-2"></i>
                                Query Knowledge
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="{{ url_for('graph_page') }}" class="nav-link rounded">
                                <i class="fas fa-project-diagram me-2"></i>
                                Graph View
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="{{ url_for('stats_page') }}" class="nav-link rounded">
                                <i class="fas fa-chart-bar me-2"></i>
                                Statistics
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="py-4">
                    {% block content %}{% endblock %}
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Global functions for API calls
        function showLoading(elementId) {
            document.getElementById(elementId).style.display = 'block';
        }

        function hideLoading(elementId) {
            document.getElementById(elementId).style.display = 'none';
        }

        function showAlert(message, type = 'info') {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            const alertContainer = document.getElementById('alerts') || document.body;
            alertContainer.insertAdjacentHTML('afterbegin', alertHtml);
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
